name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm test
      - run: node scripts/predeploy-check.js
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/watchmatrix_ci?schema=public
          JWT_ACCESS_SECRET: ci-secret-please-change
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_SECRET: ci-refresh-secret-please-change
          CORS_ORIGIN: http://localhost:5173

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run e2e
