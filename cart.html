<style type="text/css">
    body{
        margin: 0;
        padding: 0;
    }
  
      /* Styling for product image */
img {
    height: 150px;
    width: 150px;
    object-fit: cover; /* Ensures image maintains aspect ratio without stretching */
    border-radius: 8px; /* Adds rounded corners */
}

/* Styling for each cart item */
.cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    margin-bottom: 10px; /* Adds space between items */
    border-bottom: 1px solid #ddd;
    background-color: #f8f8f8; /* Light gray background */
    border-radius: 8px; /* Rounded corners for cart items */
}

/* Styling for product name and price */
.cart-item p {
    margin-right: 1%;
    font-size: 16px;
    color: #333;
}

/* Styling for headings in cart */
.headings {
    margin: 1%;
    display: flex;
    justify-content: space-between;
    font-size: 20px;
    font-weight: bold;
    color: #444;
}

/* Add some spacing between the title and cart items */
#main-body {
    padding: 20px;
}

/* Styling the cart items' image and text */
.cart-item img {
    margin-right: 15px; /* Adds space between image and text */
}

/* Price styling */
.cart-item .price {
    font-size: 18px;
    font-weight: bold;
    color: #007BFF; /* Highlight price in blue */
}

/* Add hover effect for cart items */
.cart-item:hover {
    background-color: #e1e1e1; /* Light gray hover effect */
    cursor: pointer;
}

/* Add some padding and background color to the cart section */
#main-body {
    background-color: #f1f1f1;
    border-radius: 10px;
    padding: 20px;
    margin-top: 20px;
}
/* Clear Cart Button Styling */
button {
    display: flex;
    justify-content: center;
    background-color: #FF5733; /* Vibrant red color */
    color: white;
    padding: 10px 20px; /* Adequate padding */
    font-size: 16px; /* Font size for better readability */
    font-weight: bold;
    border: none;
    border-radius: 5px; /* Rounded corners for the button */
    cursor: pointer;
    transition: background-color 0.3s ease, transform 0.2s ease; /* Smooth transition on hover */
    margin: 10px 0; /* Add spacing around the button */
   
}

.cart-actions {
    display: flex;
    gap: 12px;
    margin: 12px 0;
    flex-wrap: wrap;
}

.cart-summary {
    background-color: #f8f8f8;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 14px;
    margin: 14px 0;
}

.cart-summary p {
    margin: 8px 0;
    font-size: 16px;
}

@media (max-width: 700px) {
    .headings {
        display: none;
    }

    .cart-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }
}

/* Hover effect for the button */
button:hover {
    background-color: #FF2A00; /* Darker red on hover */
    transform: scale(1.05); /* Slight zoom-in effect */
}

/* Focus effect (optional) */
button:focus {
    outline: none; /* Removes default focus outline */
    box-shadow: 0 0 10px rgba(255, 87, 51, 0.6); /* Adds a glow effect on focus */
}

</style>
