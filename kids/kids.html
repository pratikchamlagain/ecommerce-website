<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style type="text/css">
    .row {
        margin-top: 3%;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-evenly; /* Space evenly between cards */
        gap: 20px; /* Adds spacing between rows */
        
      }
  
      /* Card styling */
     
  
      .card h3 {
        font-size: 18px;
        margin: 10px 0;
      }
  
      .rating {
        font-size: 18px;
        color: #FFD700; /* Gold */
        margin: 10px 0;
      }
  
      .price {
        font-size: 16px;
        color: #333;
        margin-bottom: 10px;
      }
  
     
  .card img{
   width: 100%;
   height: 60%;
  }
      
        /* Card styling */
        .card {
          height: 550px;
          background-color: rgb(238, 241, 252);
          box-shadow: 5px 4px 8px 7px rgba(0, 0, 0, 0.2);
          width: 320px;
          text-align: center;
          border-radius: 8px;
          overflow: hidden;
          transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
        }
      
        /* Card hover effect */
        .card:hover {
          transform: translateY(-10px); /* Lift the card slightly */
          box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3); /* Add a stronger shadow */
        }
      
        /*.card:hover img {
          filter: brightness(1.1); /* Brighten the image slightly 
        }*/
      
        /* Button hover effects */
        span{
          color: #555;
        }
        .card button {
          width: 90%;
          padding: 10px;
          margin: 5px auto;
          border: none;
          border-radius: 5px;
          background-color: #000;
          color: #fff;
          font-size: 14px;
          cursor: pointer;
          transition: background-color 0.3s, transform 0.2s;
        }
      
        .card button:hover {
          background-color: #555;
          transform: scale(1.05); /* Slightly increase button size */
        }
      
        .card button.learn-more:hover {
          background-color: #444;
        }
</style>
<body>
    <div class="kid" style="margin-top: 2%;">
