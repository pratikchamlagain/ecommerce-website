<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | WatchMatrix</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/Css/head.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f4f6f8;
      font-family: Arial, sans-serif;
    }

    .checkout-wrap {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
      display: grid;
      gap: 16px;
      grid-template-columns: 2fr 1fr;
    }

    .panel {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #ddd;
      padding: 18px;
    }

    .panel h2 {
      margin-top: 0;
      font-size: 22px;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .row {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr;
    }

    .order-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 8px 0;
      border-bottom: 1px dashed #ddd;
      padding-bottom: 8px;
    }

    .summary-total {
      margin-top: 12px;
      font-size: 18px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .actions button,
    .actions a {
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      text-decoration: none;
      padding: 10px 14px;
      cursor: pointer;
      display: inline-block;
    }

    .actions .secondary {
      background: #666;
    }

    .success {
      display: none;
      margin-top: 12px;
      background: #e8f7e8;
      color: #1f6b1f;
      border: 1px solid #9ad49a;
      border-radius: 6px;
      padding: 10px;
    }

    @media (max-width: 900px) {
      .checkout-wrap {
        grid-template-columns: 1fr;
      }

      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header id="header">
    <div class="logo">
      <img src="/images/logo.png" alt="logo" />
    </div>
    <nav class="navbar">
      <ol>
        <li><i class="fas fa-house"></i><a href="home.html">Home</a></li>
        <li><i class="fas fa-clock"></i><a href="products.html">Products</a></li>
        <li><i class="fas fa-book-open"></i><a href="research.html">Research</a></li>
        <li><i class="fas fa-blog"></i><a href="blog.html">Blog</a></li>
        <li><a href="index.html#about">About Us</a></li>
      </ol>
    </nav>
    <div class="last">
      <a href="cart.html" style="color: white;"><i class="fa-solid fa-cart-shopping"></i></a>
      <button type="button" class="sign">Sign-In <i class="fas fa-right-to-bracket"></i></button>
    </div>
  </header>

  <main class="checkout-wrap">
    <section class="panel">
      <h2>Checkout Details</h2>
      <form id="checkout-form">
        <div class="row">
          <div class="field">
            <label for="full-name">Full Name</label>
            <input id="full-name" name="fullName" required>
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="phone">Phone</label>
            <input id="phone" name="phone" required>
          </div>
          <div class="field">
            <label for="payment">Payment Method</label>
            <select id="payment" name="payment" required>
              <option value="">Select payment</option>
              <option>Cash on Delivery</option>
              <option>eSewa</option>
              <option>Khalti</option>
              <option>Card</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="address">Shipping Address</label>
          <textarea id="address" name="address" rows="4" required></textarea>
        </div>

        <div class="actions">
          <button type="submit">Place Order</button>
          <a class="secondary" href="cart.html">Back to Cart</a>
        </div>

        <div id="order-success" class="success">Order placed successfully. Thank you for shopping with us.</div>
      </form>
    </section>

    <aside class="panel">
      <h2>Order Summary</h2>
      <div id="checkout-items"></div>
      <div id="checkout-total" class="summary-total"></div>
    </aside>
  </main>

  <script src="/javascript/checkout.js"></script>
</body>
</html>
